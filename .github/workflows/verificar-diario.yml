name: Verificar Diário Oficial DPE/AM

on:
  schedule:
    # 06:00 em Manaus (UTC-4, sem horário de verão) = 10:00 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:  # Permite rodar manualmente pelo botão "Run workflow"

permissions:
  contents: write  # Necessário para commit/push das atualizações

concurrency:
  group: verificar-diario
  cancel-in-progress: false

jobs:
  verificar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests pdfplumber beautifulsoup4 anthropic

      - name: Restaurar estado (.estado-diario.json) da execução anterior
        uses: actions/cache@v4
        with:
          path: docs/.estado-diario.json
          key: estado-diario-${{ github.run_id }}
          restore-keys: |
            estado-diario-

      - name: Gerar docs/config.json a partir dos Secrets
        env:
          SMTP_REMETENTE: ${{ secrets.SMTP_REMETENTE }}
          SMTP_SENHA_APP: ${{ secrets.SMTP_SENHA_APP }}
          SMTP_DESTINATARIO: ${{ secrets.SMTP_DESTINATARIO }}
        run: |
          mkdir -p docs
          python <<'PY'
          import json, os
          config = {
              "email": {
                  "remetente":    os.environ.get("SMTP_REMETENTE", ""),
                  "senha_app":    os.environ.get("SMTP_SENHA_APP", ""),
                  "destinatario": os.environ.get("SMTP_DESTINATARIO", ""),
                  "smtp_server":  "smtp.gmail.com",
                  "smtp_port":    587,
              }
          }
          with open("docs/config.json", "w", encoding="utf-8") as f:
              json.dump(config, f, indent=2, ensure_ascii=False)
          PY

      - name: Executar verificação do Diário Oficial
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python verificar-diario-oficial.py

      - name: Limpar arquivos temporários antes do commit
        run: |
          rm -f index.backup-*.html
          rm -f docs/config.json

      - name: Commit e push se houver alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --staged --quiet; then
            echo "Nenhuma alteração para commitar."
          else
            git commit -m "chore: atualização automática do Diário Oficial ($(date -u +'%Y-%m-%d'))"
            git push
          fi
